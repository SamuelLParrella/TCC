services:
  - type: web
    name: buspass-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true   # Render gera automaticamente uma string segura
      - key: DB_HOST
        sync: false           # Você preenche no painel após criar o banco
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: buspass
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
